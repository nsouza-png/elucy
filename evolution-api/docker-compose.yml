version: "3.8"

services:
  evolution-api:
    container_name: elucy_evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - evolution-redis
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - elucy-evolution

  evolution-redis:
    container_name: elucy_evolution_redis
    image: redis:7-alpine
    restart: always
    command: redis-server --port 6379 --appendonly yes
    volumes:
      - evolution_redis_data:/data
    networks:
      - elucy-evolution
    expose:
      - "6379"

volumes:
  evolution_instances:
  evolution_redis_data:

networks:
  elucy-evolution:
    driver: bridge
