<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G4 Revenue Lab — Aquisição</title>
  <style>
    /* ── G4 BRANDBOOK DESIGN SYSTEM ─────────────────────────── */
    :root {
      --navy: #001F35;
      --navy-light: #0a2d47;
      --maue: #184460;
      --scaling: #031B26;
      --golden: #B9915B;
      --golden-light: #d4ad74;
      --golden-dim: rgba(185, 145, 91, 0.15);
      --silver: #F5F4F3;
      --silver-dim: rgba(245, 244, 243, 0.08);
      --founders-red: #441C1B;
      --ground-clay: #842E20;
      --white: #ffffff;
      --text: #d4d4d4;
      --text-dim: #7a8a96;
      --green: #2d8a4e;
      --green-bg: rgba(45, 138, 78, 0.12);
      --red: #c53030;
      --red-bg: rgba(197, 48, 48, 0.12);
      --yellow: #d69e2e;
      --yellow-bg: rgba(214, 158, 46, 0.12);
      --radius: 10px;
      --radius-sm: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--scaling);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ──────────────────────────────────────────────── */
    .header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--scaling) 100%);
      border-bottom: 1px solid var(--golden-dim);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header h1 {
      font-size: 18px; font-weight: 700; color: var(--golden);
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .header .tagline { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .header .badge {
      background: var(--golden-dim); color: var(--golden); font-size: 10px;
      padding: 4px 10px; border-radius: 20px; font-weight: 600;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .header-right { display: flex; gap: 12px; align-items: center; }
    .header-right .period {
      font-size: 12px; color: var(--text-dim); background: var(--silver-dim);
      padding: 6px 12px; border-radius: var(--radius-sm);
    }

    /* ── NAVIGATION ──────────────────────────────────────────── */
    .nav {
      background: var(--navy); border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 32px; display: flex; gap: 0; overflow-x: auto;
    }
    .nav button {
      background: none; border: none; color: var(--text-dim); font-size: 13px;
      padding: 14px 20px; cursor: pointer; font-weight: 500;
      border-bottom: 2px solid transparent; transition: all 0.2s;
      white-space: nowrap;
    }
    .nav button:hover { color: var(--silver); }
    .nav button.active {
      color: var(--golden); border-bottom-color: var(--golden); font-weight: 600;
    }

    /* ── CONTAINER ───────────────────────────────────────────── */
    .container { max-width: 1440px; margin: 0 auto; padding: 24px 32px; }

    /* ── KPI CARDS ───────────────────────────────────────────── */
    .kpi-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; margin-bottom: 24px; }
    .kpi-card {
      background: var(--navy); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius); padding: 16px 18px;
    }
    .kpi-card.highlight { border-color: var(--golden-dim); }
    .kpi-label {
      font-size: 10px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 0.06em; font-weight: 600;
    }
    .kpi-value { font-size: 24px; font-weight: 700; color: var(--silver); margin: 6px 0 2px; }
    .kpi-card.highlight .kpi-value { color: var(--golden); }
    .kpi-sub { font-size: 11px; color: var(--text-dim); }
    .kpi-delta { font-size: 11px; font-weight: 600; }
    .kpi-delta.up { color: var(--green); }
    .kpi-delta.down { color: var(--red); }
    .kpi-delta.neutral { color: var(--yellow); }

    /* ── SECTION ─────────────────────────────────────────────── */
    .section {
      background: var(--navy); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius); margin-bottom: 20px; overflow: hidden;
    }
    .section-header {
      padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    .section-header h2 {
      font-size: 14px; font-weight: 600; color: var(--golden);
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .section-header .filter {
      display: flex; gap: 8px;
    }
    .section-header select {
      background: var(--scaling); border: 1px solid rgba(255,255,255,0.1);
      color: var(--text); padding: 5px 10px; border-radius: var(--radius-sm);
      font-size: 12px; cursor: pointer;
    }
    .section-body { padding: 0; }

    /* ── TABLE ────────────────────────────────────────────────── */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th {
      text-align: left; padding: 10px 14px; background: rgba(0,0,0,0.2);
      color: var(--text-dim); font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.05em; font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky; top: 0; z-index: 1;
    }
    .data-table th.num, .data-table td.num { text-align: right; }
    .data-table td {
      padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.03);
      color: var(--text);
    }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }
    .data-table tr.total td {
      background: var(--golden-dim); font-weight: 700; color: var(--golden);
      border-top: 1px solid var(--golden-dim);
    }
    .badge-green { background: var(--green-bg); color: var(--green); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-red { background: var(--red-bg); color: var(--red); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-yellow { background: var(--yellow-bg); color: var(--yellow); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .table-scroll { max-height: 480px; overflow-y: auto; }

    /* ── CHARTS ───────────────────────────────────────────────── */
    .chart-container { padding: 20px; }
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: flex; align-items: center; gap: 12px; }
    .bar-label { width: 180px; min-width: 100px; font-size: 12px; color: var(--text-dim); text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: default; }
    .bar-label:hover { color: var(--silver); overflow: visible; position: relative; z-index: 2; background: var(--navy); padding: 2px 6px; border-radius: 4px; }
    .bar-track { flex: 1; height: 22px; background: rgba(255,255,255,0.04); border-radius: 4px; position: relative; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; display: flex; align-items: center; padding-left: 8px; }
    .bar-fill.won { background: linear-gradient(90deg, var(--golden) 0%, var(--golden-light) 100%); }
    .bar-fill.lost { background: linear-gradient(90deg, var(--ground-clay) 0%, var(--founders-red) 100%); }
    .bar-fill.open { background: linear-gradient(90deg, var(--maue) 0%, var(--navy-light) 100%); }
    .bar-value { font-size: 10px; font-weight: 700; color: var(--navy); white-space: nowrap; }

    /* ── GRID LAYOUTS ────────────────────────────────────────── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }

    /* ── FUNNEL VIZ ──────────────────────────────────────────── */
    .funnel { padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .funnel-step {
      height: 44px; display: flex; align-items: center; justify-content: center;
      border-radius: 6px; color: var(--white); font-weight: 700; font-size: 13px;
      transition: all 0.4s ease; position: relative;
    }
    .funnel-step .label { position: absolute; right: -160px; width: 150px; text-align: left; font-size: 11px; color: var(--text-dim); font-weight: 500; }
    .funnel-step .conv { position: absolute; left: -80px; width: 70px; text-align: right; font-size: 11px; font-weight: 600; }

    /* ── LOADING ──────────────────────────────────────────────── */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 400px; gap: 16px;
    }
    .loading-spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--golden); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-dim); }

    /* ── FOOTER ───────────────────────────────────────────────── */
    .footer {
      text-align: center; padding: 24px; color: var(--text-dim); font-size: 11px;
      border-top: 1px solid rgba(255,255,255,0.04); margin-top: 20px;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 1100px) {
      .kpi-grid { grid-template-columns: repeat(3, 1fr); }
      .two-col, .three-col { grid-template-columns: 1fr; }
      .funnel-step .label { position: static; width: auto; text-align: center; font-size: 10px; display: block; margin-top: 2px; }
      .funnel-step .conv { position: static; width: auto; text-align: center; font-size: 10px; }
      .funnel-step { flex-direction: column; height: auto; padding: 8px 12px; }
      .bar-label { width: 120px; min-width: 80px; }
    }
    @media (max-width: 600px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .container { padding: 16px; }
      .header { flex-direction: column; gap: 8px; padding: 16px; }
      .nav { padding: 0 16px; }
      .bar-label { width: 80px; min-width: 60px; font-size: 10px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div>
        <h1>G4 Revenue Lab</h1>
        <div class="tagline">Area de Captura de Receita — Aquisicao</div>
      </div>
      <span class="badge">Growth Ops</span>
    </div>
    <div class="header-right">
      <select id="periodSelect" style="background:var(--scaling);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;">
        <option value="all">Todos os periodos</option>
        <option value="2025">2025</option>
        <option value="2026">2026</option>
        <option value="2025-H1">2025 H1 (Jan-Jun)</option>
        <option value="2025-H2">2025 H2 (Jul-Dez)</option>
        <option value="2026-Q1">2026 Q1 (Jan-Mar)</option>
        <option value="2026-Q2">2026 Q2 (Abr-Jun)</option>
      </select>
      <span class="period" id="dataPeriod">Carregando...</span>
    </div>
  </div>

  <!-- NAV -->
  <div class="nav" id="nav">
    <button class="active" data-tab="overview">Overview</button>
    <button data-tab="linha">Por Linha de Receita</button>
    <button data-tab="closer">Por Closer</button>
    <button data-tab="canal">Por Canal</button>
    <button data-tab="tier">Por Tier</button>
    <button data-tab="churn">Churn & Perdas</button>
    <button data-tab="gav">GAV vs Meta</button>
  </div>

  <!-- CONTENT -->
  <div class="container" id="content">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div class="loading-text">Carregando dados do Databricks...</div>
    </div>
  </div>

  <div class="footer">
    G4 Educacao — Revenue Lab — Growth Ops, Time de Closers de Aquisicao
    <br>Fonte: production.diamond.funil_comercial + production.gold.gav_v3
    <br><span id="genAt"></span>
  </div>

<script>
// ── G4 REVENUE LAB ENGINE ─────────────────────────────────────

let DATA = null;
let currentTab = 'overview';
let periodFilter = 'all'; // 'all', '2025', '2026', '2026-Q1', '2026-Q2'

// ── UTILS ──
function fmt(val) {
  if (val === null || val === undefined || val === '') return '—';
  const n = parseFloat(val);
  if (isNaN(n)) return val;
  if (Math.abs(n) >= 1e6) return 'R$ ' + (n/1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return 'R$ ' + (n/1e3).toFixed(0) + 'K';
  return 'R$ ' + n.toFixed(0);
}
function fmtN(val) {
  if (val === null || val === undefined || val === '') return '—';
  return parseInt(val).toLocaleString('pt-BR');
}
function fmtPct(val) {
  if (val === null || val === undefined || val === '' || isNaN(val)) return '—';
  const n = parseFloat(val) * 100;
  return n.toFixed(1) + '%';
}
function pctBadge(val) {
  if (val === null || val === undefined) return '<span class="badge-yellow">—</span>';
  const n = parseFloat(val) * 100;
  if (n >= 100) return `<span class="badge-green">${n.toFixed(0)}%</span>`;
  if (n >= 85) return `<span class="badge-yellow">${n.toFixed(0)}%</span>`;
  return `<span class="badge-red">${n.toFixed(0)}%</span>`;
}

function toRows(query) {
  if (!query || !query.rows) return [];
  return query.rows.map(r => {
    const obj = {};
    query.columns.forEach((c, i) => obj[c] = r[i]);
    // Normalizar mes timestamp para YYYY-MM
    if (obj.mes && obj.mes.includes('T')) obj.mes = obj.mes.substring(0, 7);
    return obj;
  });
}

function groupBy(rows, key) {
  return rows.reduce((acc, r) => {
    const k = r[key] || 'N/A';
    if (!acc[k]) acc[k] = [];
    acc[k].push(r);
    return acc;
  }, {});
}

function sumField(rows, field) {
  return rows.reduce((s, r) => s + (parseFloat(r[field]) || 0), 0);
}

// ── PERIOD FILTER ──
function filterByPeriod(rows) {
  if (periodFilter === 'all') return rows;
  return rows.filter(r => {
    const m = r.mes || '';
    if (periodFilter === '2025') return m.startsWith('2025');
    if (periodFilter === '2026') return m.startsWith('2026');
    if (periodFilter === '2025-H1') return m >= '2025-01' && m <= '2025-06';
    if (periodFilter === '2025-H2') return m >= '2025-07' && m <= '2025-12';
    if (periodFilter === '2026-Q1') return m >= '2026-01' && m <= '2026-03';
    if (periodFilter === '2026-Q2') return m >= '2026-04' && m <= '2026-06';
    return true;
  });
}

document.getElementById('periodSelect').addEventListener('change', e => {
  periodFilter = e.target.value;
  render();
});

// ── NAV ──
document.getElementById('nav').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentTab = e.target.dataset.tab;
  render();
});

// ── RENDER ENGINE ──
function render() {
  if (!DATA) return;
  const c = document.getElementById('content');
  switch(currentTab) {
    case 'overview': c.innerHTML = renderOverview(); break;
    case 'linha': c.innerHTML = renderByDimension('funil_por_linha', 'linha_de_receita_vigente', 'Linha de Receita'); break;
    case 'closer': c.innerHTML = renderByDimension('funil_por_closer', 'proprietario_name', 'Closer'); break;
    case 'canal': c.innerHTML = renderByDimension('funil_por_canal', 'canal', 'Canal de Marketing'); break;
    case 'tier': c.innerHTML = renderByDimension('funil_por_tier', 'tier', 'Tier'); break;
    case 'churn': c.innerHTML = renderChurn(); break;
    case 'gav': c.innerHTML = renderGAV(); break;
  }
}

// ── OVERVIEW ──
function renderOverview() {
  const allRows = toRows(DATA.queries.funil_por_linha);
  const rows = filterByPeriod(allRows);
  const totalLeads = sumField(rows, 'total_deals');
  const totalWons = sumField(rows, 'wons');
  const totalPerdidos = sumField(rows, 'perdidos');
  const totalAberto = Math.max(0, totalLeads - totalWons - totalPerdidos);
  const totalReceita = sumField(rows, 'receita_won');
  const totalPipeline = sumField(rows, 'valor_total_pipeline');
  const winRate = totalWons / (totalWons + totalPerdidos) || 0;
  const ticketMedio = totalReceita / totalWons || 0;

  // Aggregate by month
  const byMonth = groupBy(rows, 'mes');
  const months = Object.keys(byMonth).sort();

  // MoM deltas (last 2 months in filtered set)
  let deltaReceita = null, deltaWR = null, deltaTicket = null;
  if (months.length >= 2) {
    const cur = byMonth[months[months.length - 1]];
    const prev = byMonth[months[months.length - 2]];
    const curR = sumField(cur, 'receita_won'), prevR = sumField(prev, 'receita_won');
    const curW = sumField(cur, 'wons'), prevW = sumField(prev, 'wons');
    const curP = sumField(cur, 'perdidos'), prevP = sumField(prev, 'perdidos');
    deltaReceita = prevR > 0 ? (curR - prevR) / prevR : null;
    const curWR = curW / (curW + curP) || 0, prevWR = prevW / (prevW + prevP) || 0;
    deltaWR = prevWR > 0 ? (curWR - prevWR) / prevWR : null;
    const curT = curW > 0 ? curR / curW : 0, prevT = prevW > 0 ? prevR / prevW : 0;
    deltaTicket = prevT > 0 ? (curT - prevT) / prevT : null;
  }

  let monthRows = months.map(m => {
    const mr = byMonth[m];
    const leads = sumField(mr, 'total_deals');
    const wons = sumField(mr, 'wons');
    const perdidos = sumField(mr, 'perdidos');
    const receita = sumField(mr, 'receita_won');
    const wr = wons / (wons + perdidos) || 0;
    return { mes: m, leads, wons, perdidos, receita, wr };
  });

  // Funnel data
  const funnelSteps = [
    { label: 'Leads', value: totalLeads, color: 'var(--maue)', width: 100 },
    { label: 'Em Aberto', value: totalAberto, color: 'var(--navy-light)', width: (totalAberto/totalLeads*100) || 30 },
    { label: 'Perdidos', value: totalPerdidos, color: 'var(--founders-red)', width: (totalPerdidos/totalLeads*100) || 20 },
    { label: 'Wons', value: totalWons, color: 'var(--golden)', width: Math.max((totalWons/totalLeads*100), 8) },
  ];

  return `
    <div class="kpi-grid">
      <div class="kpi-card highlight">
        <div class="kpi-label">Receita Won</div>
        <div class="kpi-value">${fmt(totalReceita)}</div>
        <div class="kpi-sub">${periodFilter === 'all' ? '2025 + 2026' : periodFilter}</div>
        ${deltaReceita !== null ? `<div class="kpi-delta ${deltaReceita >= 0 ? 'up' : 'down'}">${deltaReceita >= 0 ? '+' : ''}${(deltaReceita*100).toFixed(1)}% MoM</div>` : ''}
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Total Leads</div>
        <div class="kpi-value">${fmtN(totalLeads)}</div>
        <div class="kpi-sub">criados no periodo</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Wons</div>
        <div class="kpi-value">${fmtN(totalWons)}</div>
        <div class="kpi-sub">fechamentos</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Win Rate</div>
        <div class="kpi-value">${(winRate*100).toFixed(1)}%</div>
        <div class="kpi-sub">wons / (wons + perdidos)</div>
        ${deltaWR !== null ? `<div class="kpi-delta ${deltaWR >= 0 ? 'up' : 'down'}">${deltaWR >= 0 ? '+' : ''}${(deltaWR*100).toFixed(1)}% MoM</div>` : ''}
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Ticket Medio</div>
        <div class="kpi-value">${fmt(ticketMedio)}</div>
        <div class="kpi-sub">receita / wons</div>
        ${deltaTicket !== null ? `<div class="kpi-delta ${deltaTicket >= 0 ? 'up' : 'down'}">${deltaTicket >= 0 ? '+' : ''}${(deltaTicket*100).toFixed(1)}% MoM</div>` : ''}
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Pipeline Total</div>
        <div class="kpi-value">${fmt(totalPipeline)}</div>
        <div class="kpi-sub">valor total das opps</div>
      </div>
    </div>

    <div class="two-col">
      <div class="section">
        <div class="section-header"><h2>Funil de Conversao</h2></div>
        <div class="funnel">
          ${funnelSteps.map(s => `
            <div class="funnel-step" style="width:${s.width}%;background:${s.color}">
              ${fmtN(s.value)}
              <span class="label">${s.label}</span>
            </div>
          `).join('')}
        </div>
      </div>
      <div class="section">
        <div class="section-header"><h2>Evolucao Mensal — Receita Won</h2></div>
        <div class="chart-container">
          <div class="bar-chart">
            ${monthRows.slice(-12).map(m => {
              const maxR = Math.max(...monthRows.map(x => x.receita));
              const pct = maxR > 0 ? (m.receita / maxR * 100) : 0;
              return `
                <div class="bar-row">
                  <div class="bar-label">${m.mes}</div>
                  <div class="bar-track">
                    <div class="bar-fill won" style="width:${pct}%">
                      <span class="bar-value">${fmt(m.receita)}</span>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><h2>Consolidado Mensal</h2></div>
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr>
            <th>Mes</th><th class="num">Leads</th><th class="num">Wons</th>
            <th class="num">Perdidos</th><th class="num">Win Rate</th>
            <th class="num">Receita Won</th>
          </tr></thead>
          <tbody>
            ${monthRows.map(m => `
              <tr>
                <td>${m.mes}</td><td class="num">${fmtN(m.leads)}</td>
                <td class="num">${fmtN(m.wons)}</td><td class="num">${fmtN(m.perdidos)}</td>
                <td class="num">${pctBadge(m.wr)}</td>
                <td class="num">${fmt(m.receita)}</td>
              </tr>
            `).join('')}
            <tr class="total">
              <td>TOTAL</td><td class="num">${fmtN(totalLeads)}</td>
              <td class="num">${fmtN(totalWons)}</td><td class="num">${fmtN(totalPerdidos)}</td>
              <td class="num">${pctBadge(winRate)}</td>
              <td class="num">${fmt(totalReceita)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ── GENERIC DIMENSION VIEW ──
function renderByDimension(queryKey, dimKey, dimLabel) {
  const rows = filterByPeriod(toRows(DATA.queries[queryKey]));
  if (!rows.length) return '<div class="loading"><div class="loading-text">Sem dados para esta dimensao</div></div>';

  const byDim = groupBy(rows, dimKey);
  let dimSummary = Object.entries(byDim).map(([dim, dRows]) => ({
    dim,
    leads: sumField(dRows, 'total_deals'),
    wons: sumField(dRows, 'wons'),
    perdidos: sumField(dRows, 'perdidos' in dRows[0] ? 'perdidos' : 'total_leads'),
    receita: sumField(dRows, 'receita_won'),
    ticket: queryKey === 'funil_por_closer' || queryKey === 'funil_por_tier'
      ? (sumField(dRows, 'receita_won') / sumField(dRows, 'wons') || 0)
      : null,
  })).sort((a, b) => b.receita - a.receita);

  const totalReceita = dimSummary.reduce((s, d) => s + d.receita, 0);
  const totalLeads = dimSummary.reduce((s, d) => s + d.leads, 0);
  const totalWons = dimSummary.reduce((s, d) => s + d.wons, 0);
  const maxReceita = Math.max(...dimSummary.map(d => d.receita));

  return `
    <div class="section">
      <div class="section-header"><h2>${dimLabel} — Ranking por Receita</h2></div>
      <div class="chart-container">
        <div class="bar-chart">
          ${dimSummary.slice(0, 20).map(d => {
            const pct = maxReceita > 0 ? (d.receita / maxReceita * 100) : 0;
            return `
              <div class="bar-row">
                <div class="bar-label" title="${d.dim}">${d.dim}</div>
                <div class="bar-track">
                  <div class="bar-fill won" style="width:${pct}%">
                    <span class="bar-value">${fmt(d.receita)}</span>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><h2>${dimLabel} — Tabela Completa</h2></div>
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr>
            <th>${dimLabel}</th><th class="num">Leads</th><th class="num">Wons</th>
            <th class="num">Win Rate</th><th class="num">Receita</th>
            <th class="num">% Receita</th>
            ${dimSummary[0].ticket !== null ? '<th class="num">Ticket Medio</th>' : ''}
          </tr></thead>
          <tbody>
            ${dimSummary.map(d => {
              const wr = d.wons / (d.wons + (d.perdidos || 0)) || 0;
              const pctR = totalReceita > 0 ? d.receita / totalReceita : 0;
              return `
                <tr>
                  <td>${d.dim}</td><td class="num">${fmtN(d.leads)}</td>
                  <td class="num">${fmtN(d.wons)}</td>
                  <td class="num">${pctBadge(wr)}</td>
                  <td class="num">${fmt(d.receita)}</td>
                  <td class="num">${(pctR*100).toFixed(1)}%</td>
                  ${d.ticket !== null ? `<td class="num">${fmt(d.ticket)}</td>` : ''}
                </tr>
              `;
            }).join('')}
            <tr class="total">
              <td>TOTAL</td><td class="num">${fmtN(totalLeads)}</td>
              <td class="num">${fmtN(totalWons)}</td>
              <td class="num">${pctBadge(totalWons/(totalWons + dimSummary.reduce((s,d) => s+d.perdidos, 0)))}</td>
              <td class="num">${fmt(totalReceita)}</td>
              <td class="num">100%</td>
              ${dimSummary[0].ticket !== null ? `<td class="num">${fmt(totalReceita/totalWons)}</td>` : ''}
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ── CHURN VIEW ──
function renderChurn() {
  const rows = filterByPeriod(toRows(DATA.queries.churn_motivos));
  if (!rows.length) return '<div class="loading"><div class="loading-text">Sem dados de churn</div></div>';

  const byMotivo = groupBy(rows, 'motivo_lost');
  let motivoSummary = Object.entries(byMotivo).map(([motivo, mRows]) => ({
    motivo,
    deals: sumField(mRows, 'total_deals_perdidos'),
    receita: sumField(mRows, 'receita_perdida'),
  })).sort((a, b) => b.deals - a.deals);

  const totalDeals = motivoSummary.reduce((s, m) => s + m.deals, 0);
  const totalReceita = motivoSummary.reduce((s, m) => s + m.receita, 0);
  const maxDeals = Math.max(...motivoSummary.map(m => m.deals));

  // By month
  const byMonth = groupBy(rows, 'mes');
  const months = Object.keys(byMonth).sort();
  const monthChurn = months.map(m => ({
    mes: m,
    deals: sumField(byMonth[m], 'total_deals_perdidos'),
    receita: sumField(byMonth[m], 'receita_perdida'),
  }));
  const maxMDeals = Math.max(...monthChurn.map(m => m.deals));

  return `
    <div class="kpi-grid" style="grid-template-columns: repeat(3,1fr)">
      <div class="kpi-card">
        <div class="kpi-label">Total Deals Perdidos</div>
        <div class="kpi-value" style="color:var(--red)">${fmtN(totalDeals)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Receita Perdida</div>
        <div class="kpi-value" style="color:var(--red)">${fmt(totalReceita)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Motivos Distintos</div>
        <div class="kpi-value">${motivoSummary.length}</div>
      </div>
    </div>

    <div class="two-col">
      <div class="section">
        <div class="section-header"><h2>Top Motivos de Perda</h2></div>
        <div class="chart-container">
          <div class="bar-chart">
            ${motivoSummary.slice(0, 15).map(m => {
              const pct = maxDeals > 0 ? (m.deals / maxDeals * 100) : 0;
              return `
                <div class="bar-row">
                  <div class="bar-label" title="${m.motivo}">${m.motivo.substring(0,25)}</div>
                  <div class="bar-track">
                    <div class="bar-fill lost" style="width:${pct}%">
                      <span class="bar-value" style="color:var(--silver)">${fmtN(m.deals)}</span>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-header"><h2>Evolucao Mensal — Perdas</h2></div>
        <div class="chart-container">
          <div class="bar-chart">
            ${monthChurn.slice(-12).map(m => {
              const pct = maxMDeals > 0 ? (m.deals / maxMDeals * 100) : 0;
              return `
                <div class="bar-row">
                  <div class="bar-label">${m.mes}</div>
                  <div class="bar-track">
                    <div class="bar-fill lost" style="width:${pct}%">
                      <span class="bar-value" style="color:var(--silver)">${fmtN(m.deals)} (${fmt(m.receita)})</span>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><h2>Motivos de Perda — Tabela Completa</h2></div>
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr>
            <th>Motivo</th><th class="num">Deals</th><th class="num">% Total</th><th class="num">Receita Perdida</th>
          </tr></thead>
          <tbody>
            ${motivoSummary.map(m => `
              <tr>
                <td>${m.motivo}</td><td class="num">${fmtN(m.deals)}</td>
                <td class="num">${(m.deals/totalDeals*100).toFixed(1)}%</td>
                <td class="num">${fmt(m.receita)}</td>
              </tr>
            `).join('')}
            <tr class="total">
              <td>TOTAL</td><td class="num">${fmtN(totalDeals)}</td>
              <td class="num">100%</td><td class="num">${fmt(totalReceita)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ── GAV VIEW ──
function renderGAV() {
  const allRows = toRows(DATA.queries.gav_meta_realizado);
  const rows = filterByPeriod(allRows);
  if (!rows.length) return '<div class="loading"><div class="loading-text">Sem dados GAV</div></div>';

  const realizadoRows = rows.filter(r => r.event === 'realizado' && r.canal);
  const metaRows = rows.filter(r => r.event === 'meta canais' && r.canal);

  // By Canal (acumulado)
  const byCanal = {};
  realizadoRows.forEach(r => {
    if (!byCanal[r.canal]) byCanal[r.canal] = { realizado: 0, meta: 0 };
    byCanal[r.canal].realizado += parseFloat(r.realizado) || 0;
  });
  metaRows.forEach(r => {
    if (!byCanal[r.canal]) byCanal[r.canal] = { realizado: 0, meta: 0 };
    byCanal[r.canal].meta += parseFloat(r.meta_canais) || 0;
  });

  let gavSummary = Object.entries(byCanal).map(([canal, v]) => ({
    canal, ...v, pct: v.meta > 0 ? v.realizado / v.meta : null
  })).sort((a, b) => b.realizado - a.realizado);

  const totalR = gavSummary.reduce((s, g) => s + g.realizado, 0);
  const totalM = gavSummary.reduce((s, g) => s + g.meta, 0);

  // By Month (breakdown mensal)
  const byMonth = {};
  realizadoRows.forEach(r => {
    if (!byMonth[r.mes]) byMonth[r.mes] = { realizado: 0, meta: 0 };
    byMonth[r.mes].realizado += parseFloat(r.realizado) || 0;
  });
  metaRows.forEach(r => {
    if (!byMonth[r.mes]) byMonth[r.mes] = { realizado: 0, meta: 0 };
    byMonth[r.mes].meta += parseFloat(r.meta_canais) || 0;
  });
  const monthGAV = Object.entries(byMonth).sort(([a],[b]) => a.localeCompare(b)).map(([mes, v]) => ({
    mes, ...v, pct: v.meta > 0 ? v.realizado / v.meta : null
  }));
  const maxMonth = Math.max(...monthGAV.map(m => Math.max(m.realizado, m.meta)));

  return `
    <div class="kpi-grid" style="grid-template-columns: repeat(3,1fr)">
      <div class="kpi-card highlight">
        <div class="kpi-label">Realizado 2026</div>
        <div class="kpi-value">${fmt(totalR)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Meta 2026</div>
        <div class="kpi-value">${fmt(totalM)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Atingimento</div>
        <div class="kpi-value">${totalM > 0 ? (totalR/totalM*100).toFixed(0) + '%' : '—'}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><h2>Evolucao Mensal — Realizado vs Meta</h2></div>
      <div class="chart-container">
        <div class="bar-chart">
          ${monthGAV.map(m => {
            const pctR = maxMonth > 0 ? (m.realizado / maxMonth * 100) : 0;
            const pctM = maxMonth > 0 ? (m.meta / maxMonth * 100) : 0;
            return `
              <div style="margin-bottom:8px">
                <div class="bar-row">
                  <div class="bar-label">${m.mes} <small style="color:var(--golden)">Real</small></div>
                  <div class="bar-track">
                    <div class="bar-fill won" style="width:${pctR}%">
                      <span class="bar-value">${fmt(m.realizado)}</span>
                    </div>
                  </div>
                </div>
                <div class="bar-row" style="margin-top:2px">
                  <div class="bar-label"><small style="color:var(--text-dim)">Meta</small></div>
                  <div class="bar-track">
                    <div class="bar-fill open" style="width:${pctM}%">
                      <span class="bar-value" style="color:var(--text)">${fmt(m.meta)}</span>
                    </div>
                  </div>
                </div>
                <div style="text-align:right;font-size:11px;margin-top:2px;padding-right:14px">
                  ${m.pct !== null ? pctBadge(m.pct) : '<span class="badge-yellow">Sem meta</span>'}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header"><h2>Realizado vs Meta por Canal</h2></div>
      <div class="table-scroll">
        <table class="data-table">
          <thead><tr>
            <th>Canal</th><th class="num">Realizado</th><th class="num">Meta</th>
            <th class="num">Atingimento</th><th class="num">Gap</th>
          </tr></thead>
          <tbody>
            ${gavSummary.map(g => `
              <tr>
                <td>${g.canal}</td>
                <td class="num">${fmt(g.realizado)}</td>
                <td class="num">${fmt(g.meta)}</td>
                <td class="num">${g.pct !== null ? pctBadge(g.pct) : '—'}</td>
                <td class="num">${g.meta > 0 ? fmt(g.realizado - g.meta) : '—'}</td>
              </tr>
            `).join('')}
            <tr class="total">
              <td>TOTAL</td>
              <td class="num">${fmt(totalR)}</td>
              <td class="num">${fmt(totalM)}</td>
              <td class="num">${totalM > 0 ? pctBadge(totalR/totalM) : '—'}</td>
              <td class="num">${fmt(totalR - totalM)}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ── INIT ──
async function init() {
  try {
    const resp = await fetch('revenue_data.json');
    DATA = await resp.json();
    document.getElementById('dataPeriod').textContent = DATA.period || '2025-2026';
    document.getElementById('genAt').textContent = 'Gerado em: ' + (DATA.generated_at || '—');
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div class="loading">
        <div class="loading-text" style="color:var(--red)">
          Erro ao carregar dados. Execute extract_funnel.py primeiro.<br>
          <small>${e.message}</small>
        </div>
      </div>
    `;
  }
}

init();
</script>
</body>
</html>
